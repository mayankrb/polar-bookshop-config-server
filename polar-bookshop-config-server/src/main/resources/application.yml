server:
  port: 8888
  tomcat:
    connection-timeout: 2s
    keep-alive-timeout: 15s
    threads:
      max: 200
      min-spare: 20

spring:
  application:
    name: polar-bookshop-config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/mayankrb/polar-bookshop-config-files-repo.git
          default-label: main
          username: mayankrb
          password: ${POLAR_BOOKSHOP_CONFIG_GITHUB_TOKEN}
          clone-on-start: true
          force-pull: true
          timeout: 5
          # search paths for each service
          search-paths:
            - "{application}"
